<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Business Banker</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #ff4757;
            --green: #2ed573;
            --red: #ff4757;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; background: var(--bg); color: #fff; 
            margin: 0; padding: 0; overflow-x: hidden; /* Prevent side scroll */
        }
        
        /* Sticky Header */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: #222; padding: 8px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--accent);
        }

        /* Setup Screen */
        #setup { text-align: center; padding: 20px; }
        input { padding: 12px; width: 90%; border-radius: 8px; border: none; margin-bottom: 10px; font-size: 1rem; }
        #wheel-container { display: none; margin: 10px auto; position: relative; width: 280px; height: 280px; }
        #canvas { border-radius: 50%; border: 3px solid var(--accent); width: 100%; height: 100%; }
        #pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid white; z-index: 10; }

        /* Game Board */
        #game { display: none; padding: 5px; }
        .player-grid { 
            display: flex; flex-wrap: wrap; gap: 6px; 
            justify-content: center;
        }
        .player-card { 
            background: var(--card); border-radius: 8px; padding: 8px; 
            width: calc(50% - 6px); /* 2 cards per row for better visibility */
            border-top: 3px solid var(--accent);
            display: flex; flex-direction: column;
        }
        
        .name { font-size: 0.9rem; font-weight: bold; text-align: center; color: var(--accent); }
        .balance { font-size: 1.4rem; font-weight: bold; text-align: center; color: var(--green); margin: 5px 0; }
        .balance.neg { color: var(--red); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        button { border: none; border-radius: 4px; padding: 10px 0; cursor: pointer; font-size: 0.75rem; font-weight: bold; color: white; }
        .take { background: #1b5e20; }
        .give { background: #b71c1c; }
        .btn-main { background: var(--accent); padding: 12px; width: 100%; margin-top: 10px; border-radius: 8px; font-size: 1rem;}
        
        .label { font-size: 0.6rem; text-align: center; opacity: 0.7; margin: 4px 0; text-transform: uppercase; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="setup">
    <h3>Business Banker</h3>
    <input type="text" id="namesInput" placeholder="Names (Ron, Sam, Jo...)">
    <button class="btn-main" id="initBtn" onclick="initSetup()">Create Wheel</button>
    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="canvas" width="300" height="300"></canvas>
        <button class="btn-main" id="spinBtn" onclick="spinWheel()">TAP TO SPIN</button>
    </div>
</div>

<div id="game">
    <div class="header">
        <div id="turn-msg" style="font-size: 0.9rem;"></div>
        <button style="background:none; color:#aaa; font-size:0.7rem; border:1px solid #444; padding:4px 8px;" onclick="resetGame()">RESTART</button>
    </div>
    <div class="player-grid" id="player-grid"></div>
</div>

<script>
    let state = { players: [], firstPlayer: "" };
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let names = [];

    window.onload = () => {
        const saved = localStorage.getItem('biz_v6');
        if (saved) { state = JSON.parse(saved); showGame(); }
    };

    function initSetup() {
        const val = document.getElementById('namesInput').value;
        if (!val) return;
        names = val.split(',').map(n => n.trim()).filter(n => n);
        document.getElementById('initBtn').style.display = 'none';
        document.getElementById('namesInput').style.display = 'none';
        document.getElementById('wheel-container').style.display = 'block';
        drawWheel();
    }

    function drawWheel() {
        const slice = (Math.PI * 2) / names.length;
        names.forEach((name, i) => {
            ctx.beginPath();
            ctx.fillStyle = i % 2 === 0 ? '#ff4757' : '#2f3542';
            ctx.moveTo(150, 150);
            ctx.arc(150, 150, 150, i * slice, (i + 1) * slice);
            ctx.fill();
            ctx.save();
            ctx.translate(150, 150);
            ctx.rotate(i * slice + slice / 2);
            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            ctx.fillText(name.substring(0, 6), 65, 5);
            ctx.restore();
        });
    }

    function spinWheel() {
        const btn = document.getElementById('spinBtn');
        btn.disabled = true;
        const totalRotation = Math.PI * 2 * 10 + Math.random() * Math.PI * 2;
        const duration = 5000;
        const start = performance.now();

        function animate(time) {
            const progress = Math.min((time - start) / duration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 3);
            canvas.style.transform = `rotate(${easeOut * totalRotation}rad)`;
            if (progress < 1) requestAnimationFrame(animate);
            else {
                const winningIndex = names.length - 1 - Math.floor((( (easeOut * totalRotation) + Math.PI/2) % (Math.PI * 2)) / ((Math.PI * 2) / names.length));
                state.players = names.map(n => ({ name: n, balance: 0 }));
                state.firstPlayer = names[winningIndex < 0 ? 0 : winningIndex];
                setTimeout(saveAndRender, 800);
            }
        }
        requestAnimationFrame(animate);
    }

    function updateBal(idx, amt) {
        state.players[idx].balance += amt;
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('biz_v6', JSON.stringify(state));
        showGame();
    }

    function showGame() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        document.getElementById('turn-msg').innerText = `🎲 Starts: ${state.firstPlayer}`;
        const list = document.getElementById('player-grid');
        
        list.innerHTML = state.players.map((p, i) => `
            <div class="player-card">
                <div class="name">${p.name}</div>
                <div class="balance ${p.balance < 0 ? 'neg' : ''}">${p.balance}</div>
                
                <div class="label">Bank Take (+)</div>
                <div class="btn-grid">
                    <button class="take" onclick="updateBal(${i}, 50)">50</button>
                    <button class="take" onclick="updateBal(${i}, 100)">100</button>
                    <button class="take" onclick="updateBal(${i}, 500)">500</button>
                    <button class="take" onclick="updateBal(${i}, 1000)">1k</button>
                </div>
                <div class="label">Bank Give (-)</div>
                <div class="btn-grid">
                    <button class="give" onclick="updateBal(${i}, -50)">50</button>
                    <button class="give" onclick="updateBal(${i}, -100)">100</button>
                    <button class="give" onclick="updateBal(${i}, -500)">500</button>
                    <button class="give" onclick="updateBal(${i}, -1000)">1k</button>
                </div>
            </div>
        `).join('');
    }

    function resetGame() {
        if(confirm("Wipe all data and restart?")) {
            localStorage.removeItem('biz_v6');
            location.reload();
        }
    }
</script>
</body>
</html>
