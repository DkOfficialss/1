<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplier Logger PRO</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 500px; margin: auto; }
        button { padding: 25px 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; background: #007bff; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { transform: translateY(2px); box-shadow: none; }
        .btn-10 { background: #6f42c1; }
        .btn-high { background: #dc3545; }
        .controls { margin-top: 40px; border-top: 1px solid #ccc; pt: 20px; }
        .download-btn { background: #28a745; padding: 15px 30px; margin-top: 20px; }
        #status { margin-top: 15px; color: #555; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Multiplier Logger</h2>
    <div class="grid">
        <button onclick="logData('<1x')">&lt;1x</button>
        <button onclick="logData('2x')">2x</button>
        <button onclick="logData('3x')">3x</button>
        <button onclick="logData('4x')">4x</button>
        <button class="btn-10" onclick="logData('10x+')">10x+</button>
        <button class="btn-high" onclick="logData('10x+++')">10x+++</button>
    </div>

    <div class="controls">
        <button class="download-btn" onclick="downloadJSON()">Download Log File</button>
        <div id="status">Ready to log...</div>
    </div>

    <script>
        let lastTapTime = null;
        let currentBatchId = Date.now();

        function logData(multiplier) {
            const now = new Date();
            const offsetTime = new Date(now.getTime() - 10000); // 10s back
            
            // 12-hour format with AM/PM
            let hours = offsetTime.getHours();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            const timestamp = `${hours.toString().padStart(2, '0')}:${offsetTime.getMinutes().toString().padStart(2, '0')}:${offsetTime.getSeconds().toString().padStart(2, '0')} ${ampm}`;

            if (lastTapTime && (now - lastTapTime > 60000)) {
                currentBatchId = Date.now();
            }
            lastTapTime = now;

            const entry = {
                batch: currentBatchId,
                multiplier: multiplier,
                time: timestamp,
                rawTime: offsetTime.getTime(), // Kept for sorting/graphing
                fullDate: offsetTime.toLocaleDateString()
            };

            let history = JSON.parse(localStorage.getItem('multiplierLogs')) || [];
            history.push(entry);
            localStorage.setItem('multiplierLogs', JSON.stringify(history));
            
            document.getElementById('status').innerText = `Logged ${multiplier} at ${timestamp}`;
        }

        function downloadJSON() {
            const data = localStorage.getItem('multiplierLogs');
            if (!data) return alert("No data!");
            const blob = new Blob([data], { type: "application/json" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `data_${new Date().getTime()}.json`;
            a.click();
        }
    </script>
</body>
</html>
